<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-label="Luciano Ditzel — Senior Software Engineer">
  <defs>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f97316" stop-opacity=".45"/>
      <stop offset="55%"  stop-color="#f4b740" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#f4b740" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbFill" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#3a1f0a"/>
      <stop offset="100%" stop-color="#1a1210"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4b740"/>
    </linearGradient>
    <linearGradient id="nameGradLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#111118"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glowBlur">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <style>
      @keyframes orbitCW  { to { transform: rotate(360deg);  } }
      @keyframes orbitCCW { to { transform: rotate(-360deg); } }
      @keyframes breathe  { 0%,100% { opacity:.5 } 50% { opacity:.85 } }
      @keyframes slideIn  { from { opacity:0; transform:translateX(-22px) } to { opacity:1; transform:none } }
      @keyframes blink    { 0%,45% { opacity:1 } 55%,100% { opacity:0 } }
      @keyframes dotPulse { 0%,100% { opacity:.75 } 50% { opacity:1 } }

      .bg  { fill: #0a0a0b }
      .gl  { animation: breathe 5s ease-in-out infinite }

      .oa  { transform-origin:718px 148px; animation: orbitCW  14s linear infinite }
      .ob  { transform-origin:718px 148px; animation: orbitCCW 22s linear infinite }
      .dp  { animation: dotPulse 2.5s ease-in-out infinite }

      .ey  { font:700 11px/1 'Courier New',Courier,monospace; fill:#f4b740; letter-spacing:4px;
             opacity:0; animation: slideIn .5s .15s ease-out forwards }
      .n1  { font:800 64px/1 system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif;
             fill:url(#nameGrad); letter-spacing:-3px;
             opacity:0; animation: slideIn .65s .35s ease-out forwards }
      .n2  { font:800 64px/1 system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif;
             fill:url(#nameGrad); letter-spacing:-3px;
             opacity:0; animation: slideIn .65s .52s ease-out forwards }
      .cur { fill:#f4b740; animation: blink 1.1s ease-in-out infinite }
      .ro  { font:400 15px/1 system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif; fill:#8a8a93;
             opacity:0; animation: slideIn .6s .72s ease-out forwards }
      .tg  { font:400 11.5px/1 'Courier New',Courier,monospace; fill:#4a4a55; letter-spacing:.5px;
             opacity:0; animation: slideIn .6s .88s ease-out forwards }

      @media (prefers-color-scheme: light) {
        .bg  { fill: #f8f7f5 }
        .n1  { fill: url(#nameGradLight) }
        .n2  { fill: url(#nameGradLight) }
        .ro  { fill: #6a6a73 }
        .tg  { fill: #9a9aaa }
        .gl  { opacity: .3 }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="900" height="300"/>

  <!-- Ambient warm glow -->
  <ellipse class="gl" cx="718" cy="148" rx="175" ry="158"
           fill="url(#glowGrad)" filter="url(#glowBlur)"/>

  <!-- Orbit rings -->
  <circle cx="718" cy="148" r="114" fill="none" stroke="#f4b740" stroke-width=".6" stroke-opacity=".14"/>
  <circle cx="718" cy="148" r="89"  fill="none" stroke="#f4b740" stroke-width=".6" stroke-opacity=".22"/>

  <!-- Orbit group A (clockwise, outer) -->
  <g class="oa">
    <circle cx="718" cy="34"  r="5"   fill="#f4b740" class="dp"/>
    <circle cx="718" cy="262" r="3.5" fill="#f4b740" opacity=".55" class="dp"/>
  </g>

  <!-- Orbit group B (counter-clockwise, inner) -->
  <g class="ob">
    <circle cx="629" cy="148" r="3" fill="#f97316" opacity=".7"/>
    <circle cx="807" cy="148" r="3" fill="#f97316" opacity=".45"/>
  </g>

  <!-- Orb core -->
  <circle cx="718" cy="148" r="72" fill="url(#orbFill)"
          stroke="#f4b740" stroke-width="1" stroke-opacity=".36"/>

  <!-- Highlight on orb -->
  <ellipse cx="700" cy="124" rx="28" ry="18"
           fill="rgba(255,255,255,0.05)" transform="rotate(-20,700,124)"/>

  <!-- LD Monogram -->
  <text x="718" y="165" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-weight="800" font-size="40" letter-spacing="-2"
        fill="#f4b740">LD</text>

  <!-- ── Left content ── -->

  <!-- Eyebrow -->
  <text class="ey" x="60" y="76">// engineer</text>

  <!-- Name line 1 -->
  <text class="n1" x="56" y="152">Luciano</text>

  <!-- Name line 2 + blinking cursor -->
  <text class="n2" x="56" y="218">Ditzel<tspan fill="#f4b740" class="cur">_</tspan></text>

  <!-- Role -->
  <text class="ro" x="58" y="255">Senior Software Engineer</text>

  <!-- Tags -->
  <text class="tg" x="58" y="278">Cloud-Native · Event-Driven · AWS · Kafka · 7+ yrs</text>
</svg>
