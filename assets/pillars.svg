<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120" role="img" aria-label="Engineering pillars">
  <defs>
    <style>
      @keyframes in { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }

      .bg   { fill: transparent }
      .card { fill: #131316; rx: 12 }
      .rim  { fill: none; stroke: #26262d; stroke-width: 1 }
      .ico  { font: 700 22px/1 system-ui,sans-serif; fill: #f4b740 }
      .head { font: 600 13px/1 system-ui,-apple-system,sans-serif; fill: #f5f5f5 }
      .sub  { font: 400 11px/1.5 system-ui,-apple-system,sans-serif; fill: #8a8a93 }
      .c1   { opacity:0; animation: in .5s .1s ease-out forwards }
      .c2   { opacity:0; animation: in .5s .25s ease-out forwards }
      .c3   { opacity:0; animation: in .5s .4s ease-out forwards }

      @media (prefers-color-scheme: light) {
        .card { fill: #f0f0ee }
        .rim  { stroke: #d8d8d4 }
        .head { fill: #111118 }
        .sub  { fill: #6a6a73 }
      }
    </style>
  </defs>

  <rect class="bg" width="900" height="120"/>

  <!-- Card 1: Backend -->
  <g class="c1">
    <rect class="card" x="0"   y="0" width="286" height="116" rx="12"/>
    <rect class="rim"  x=".5"  y=".5" width="285" height="115" rx="12"/>
    <text class="ico"  x="24" y="36">⟨/⟩</text>
    <text class="head" x="24" y="60">Backend Engineering</text>
    <text class="sub"  x="24" y="80">Java · Kotlin · Go · Python</text>
    <text class="sub"  x="24" y="96">Spring Boot · Webflux · Spring Data</text>
  </g>

  <!-- Card 2: Cloud -->
  <g class="c2">
    <rect class="card" x="307" y="0" width="286" height="116" rx="12"/>
    <rect class="rim"  x="307.5" y=".5" width="285" height="115" rx="12"/>
    <text class="ico"  x="331" y="36">☁</text>
    <text class="head" x="331" y="60">Cloud &amp; Platform</text>
    <text class="sub"  x="331" y="80">AWS · Kubernetes · Docker · Terraform</text>
    <text class="sub"  x="331" y="96">Helm · ArgoCD · GitLab CI</text>
  </g>

  <!-- Card 3: Event-Driven -->
  <g class="c3">
    <rect class="card" x="614" y="0" width="286" height="116" rx="12"/>
    <rect class="rim"  x="614.5" y=".5" width="285" height="115" rx="12"/>
    <text class="ico"  x="638" y="36">⟳</text>
    <text class="head" x="638" y="60">Event-Driven Systems</text>
    <text class="sub"  x="638" y="80">Apache Kafka · PostgreSQL · Redis</text>
    <text class="sub"  x="638" y="96">MongoDB · DDD · Microservices</text>
  </g>
</svg>
